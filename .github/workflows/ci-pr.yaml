name: CI (PR + Push)

on:
  pull_request:
  push:
    branches: [main, develop, feature/*, fix/*]

concurrency:
  group: $$   {{ github.workflow }}-   $${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint & format check
        run: uv run ruff check --output-format=github .

      - name: MyPy type check
        run: uv run mypy src/ --strict --install-types --non-interactive

  unit-tests:
    needs: lint-type
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --cov=src --cov-report=xml

      - name: Upload coverage (optional)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # only if you have this set up

  integration-smoke:
    needs: unit-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --frozen --all-extras  # adjust extras if MinerU/Docling are heavy

      - name: Smoke test on sample PDFs
        run: |
          # Replace with your actual smoke test command
          uv run python -m your_project.scripts.smoke_test --corpus-dir data/ --max-docs 4 || echo "Smoke test failed but continuing"